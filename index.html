<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Monitor Diario</title>
    <meta name="description" content="Monitor Diario - Información útil: dólar, clima, trenes y más" />
    <meta name="theme-color" content="#e1d5c4" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="icon"
      href="./assets/info.png"
      type="image/png"
    />
  </head>
  <body>
    <header class="header">
      <div class="reloj" id="reloj"></div>
    </header>

    <main class="main">
      <section class="seccion" id="temporal">
        <button class="seccion-toggle" aria-expanded="true" aria-controls="temporal-contenido">
          <h2>Info Temporal</h2>
          <span class="flecha">▾</span>
        </button>
        <div class="seccion-contenido" id="temporal-contenido">
          <div class="cards" id="temporal-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>

      <section class="seccion" id="feriados">
        <button class="seccion-toggle" aria-expanded="true" aria-controls="feriados-contenido">
          <h2>Feriados y Eventos</h2>
          <span class="flecha">▾</span>
        </button>
        <div class="seccion-contenido" id="feriados-contenido">
          <div class="cards cards-compact" id="feriados-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>

      <section class="seccion" id="dolar">
        <button class="seccion-toggle" aria-expanded="true" aria-controls="dolar-contenido">
          <h2>Cotización dólar</h2>
          <span class="flecha">▾</span>
        </button>
        <div class="seccion-contenido" id="dolar-contenido">
          <div class="cards" id="dolar-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>

      <section class="seccion" id="clima">
        <button class="seccion-toggle" aria-expanded="true" aria-controls="clima-contenido">
          <h2>Clima</h2>
          <span class="flecha">▾</span>
        </button>
        <div class="seccion-contenido" id="clima-contenido">
          <div class="cards" id="clima-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>

      <section class="seccion" id="trenes">
        <button class="seccion-toggle" aria-expanded="true" aria-controls="trenes-contenido">
          <h2>Línea Roca - Estado</h2>
          <span class="flecha">▾</span>
        </button>
        <div class="seccion-contenido" id="trenes-contenido">
          <div class="cards" id="trenes-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
          <div class="alertas" id="trenes-alertas"></div>
        </div>
      </section>

      <section class="seccion" id="arribos">
        <button class="seccion-toggle" aria-expanded="true" aria-controls="arribos-contenido">
          <h2>Línea Roca - Horarios</h2>
          <span class="flecha">▾</span>
        </button>
        <div class="seccion-contenido" id="arribos-contenido">
          <div id="arribos-container">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>
        Última actualización: <span id="ultima-actualizacion">-</span>
      </p>
      <p>
        Fuentes: dolarapi.com | Open-Meteo | argentinadatos.com |
        SOFSE Trenes
      </p>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
