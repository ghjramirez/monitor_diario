<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Monitor Diario</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="shortcut icon"
      href="./assets/info.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <header class="header">
      <div class="reloj" id="reloj"></div>
    </header>

    <main class="main">
      <section class="seccion" id="temporal">
        <button class="seccion-toggle" onclick="toggleSeccion('temporal')">
          <h2>Info Temporal</h2>
          <span class="flecha">&#9662;</span>
        </button>
        <div class="seccion-contenido">
          <div class="cards" id="temporal-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>

      <section class="seccion" id="feriados">
        <button class="seccion-toggle" onclick="toggleSeccion('feriados')">
          <h2>Feriados y Eventos</h2>
          <span class="flecha">&#9662;</span>
        </button>
        <div class="seccion-contenido">
          <div class="cards cards-compact" id="feriados-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>

      <section class="seccion" id="dolar">
        <button class="seccion-toggle" onclick="toggleSeccion('dolar')">
          <h2>Cotización dólar</h2>
          <span class="flecha">&#9662;</span>
        </button>
        <div class="seccion-contenido">
          <div class="cards" id="dolar-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>

      <section class="seccion" id="clima">
        <button class="seccion-toggle" onclick="toggleSeccion('clima')">
          <h2>Clima</h2>
          <span class="flecha">&#9662;</span>
        </button>
        <div class="seccion-contenido">
          <div class="cards" id="clima-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>

      <section class="seccion" id="trenes">
        <button class="seccion-toggle" onclick="toggleSeccion('trenes')">
          <h2>Línea Roca - Estado</h2>
          <span class="flecha">&#9662;</span>
        </button>
        <div class="seccion-contenido">
          <div class="cards" id="trenes-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
          <div class="alertas" id="trenes-alertas"></div>
        </div>
      </section>

      <section class="seccion" id="arribos">
        <button class="seccion-toggle" onclick="toggleSeccion('arribos')">
          <h2>Línea Roca - Horarios</h2>
          <span class="flecha">&#9662;</span>
        </button>
        <div class="seccion-contenido">
          <div id="arribos-container">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>
        Última actualización: <span id="ultima-actualizacion">-</span>
      </p>
      <p>
        Fuentes: dolarapi.com | Open-Meteo | argentinadatos.com |
        SOFSE Trenes
      </p>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
