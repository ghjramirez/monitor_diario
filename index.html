<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Monitor Diario</title>
    <meta
      name="description"
      content="Monitor Diario - Información útil: dólar, clima, trenes y más"
    />
    <meta name="theme-color" content="#e1d5c4" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="./assets/info.png" type="image/png" />
  </head>
  <body>
    <header class="header">
      <div class="reloj" id="reloj"></div>
    </header>

    <main class="main">
      <section class="seccion" id="temporal">
        <button
          class="seccion-toggle"
          aria-expanded="true"
          aria-controls="temporal-contenido"
        >
          <h2>Info Temporal</h2>
          <span class="flecha">▾</span>
        </button>
        <div class="seccion-contenido" id="temporal-contenido">
          <div class="cards" id="temporal-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>

      <section class="seccion seccion-meta" id="meta-ahorro">
        <div class="meta-banner meta-pendiente" id="meta-banner">
          <span class="meta-icono" id="meta-icono">🐷</span>
          <div class="meta-info">
            <div class="meta-fila">
              <span>Hoy no has cumplido la meta de ahorro (</span>
              <span class="meta-monto" id="meta-monto">5</span>
              <span> USD)</span>
            </div>
            <button class="meta-btn" id="meta-btn">✓ Sí, ahorré</button>
          </div>
        </div>
      </section>

      <section class="seccion" id="feriados">
        <button
          class="seccion-toggle"
          aria-expanded="true"
          aria-controls="feriados-contenido"
        >
          <h2>Feriados y Eventos</h2>
          <span class="flecha">▾</span>
        </button>
        <div class="seccion-contenido" id="feriados-contenido">
          <div class="cards cards-compact" id="feriados-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>

      <section class="seccion" id="dolar">
        <button
          class="seccion-toggle"
          aria-expanded="true"
          aria-controls="dolar-contenido"
        >
          <h2>Cotización dólar</h2>
          <span class="flecha">▾</span>
        </button>
        <div class="seccion-contenido" id="dolar-contenido">
          <div class="cards" id="dolar-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
          <div class="conversor" id="dolar-conversor">
            <div class="conversor-fila">
              <div class="conversor-campo">
                <label for="conv-tipo">Tipo de dólar</label>
                <select id="conv-tipo">
                  <option value="oficial">Dólar Oficial 🟢</option>
                  <option value="blue">Dólar Blue 🔵</option>
                  <option value="tarjeta">Dólar Tarjeta 💳</option>
                </select>
              </div>
              <div class="conversor-campo">
                <label>Dirección</label>
                <div class="conversor-direccion" id="conv-direccion">
                  <button
                    class="conv-btn active"
                    data-direction="usd-ars"
                  >
                    USD → ARS
                  </button>
                  <button class="conv-btn" data-direction="ars-usd">
                    ARS → USD
                  </button>
                </div>
              </div>
            </div>
            <div class="conversor-fila">
              <div class="conversor-campo">
                <label for="conv-monto">Monto</label>
                <input
                  type="number"
                  id="conv-monto"
                  placeholder="Ingresá el monto"
                  min="0"
                  step="any"
                />
              </div>
              <div class="conversor-campo">
                <label>Resultado</label>
                <div class="conversor-valor" id="conv-resultado">
                  —
                </div>
                <div class="conversor-tc" id="conv-tc">
                  Cargando...
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="seccion" id="clima">
        <button
          class="seccion-toggle"
          aria-expanded="true"
          aria-controls="clima-contenido"
        >
          <h2>Clima</h2>
          <span class="flecha">▾</span>
        </button>
        <div class="seccion-contenido" id="clima-contenido">
          <div class="cards" id="clima-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>

      <section class="seccion" id="trenes">
        <button
          class="seccion-toggle"
          aria-expanded="true"
          aria-controls="trenes-contenido"
        >
          <h2>Línea Roca - Estado</h2>
          <span class="flecha">▾</span>
        </button>
        <div class="seccion-contenido" id="trenes-contenido">
          <div class="cards" id="trenes-cards">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
          <div class="alertas" id="trenes-alertas"></div>
        </div>
      </section>

      <section class="seccion" id="arribos">
        <button
          class="seccion-toggle"
          aria-expanded="true"
          aria-controls="arribos-contenido"
        >
          <h2>Línea Roca - Horarios</h2>
          <span class="flecha">▾</span>
        </button>
        <div class="seccion-contenido" id="arribos-contenido">
          <div id="arribos-container">
            <div class="card loading">
              <div class="card-titulo">Cargando...</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>
        Última actualización: <span id="ultima-actualizacion">-</span>
      </p>
      <p>
        Fuentes: dolarapi.com | Open-Meteo | argentinadatos.com |
        SOFSE Trenes
      </p>
    </footer>

    <button class="toolbox-btn" id="toolbox-btn" aria-label="Abrir herramientas" title="Herramientas">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
    </button>
    <div class="toolbox-overlay" id="toolbox-overlay"></div>
    <aside class="toolbox" id="toolbox" role="dialog" aria-label="Panel de herramientas">
      <div class="toolbox-header">
        <h2 class="toolbox-titulo">Herramientas</h2>
        <button class="toolbox-close" id="toolbox-close" aria-label="Cerrar panel">&times;</button>
      </div>
      <nav class="toolbox-menu" id="toolbox-menu"></nav>
      <div class="toolbox-content" id="toolbox-content"></div>
    </aside>

    <h1 class="sr-only">Monitor Diario - Dashboard informativo</h1>
    <script src="js/app.js"></script>
  </body>
</html>
