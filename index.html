<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Monitor Diario</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="shortcut icon"
      href="./assets/info.png"
      type="image/x-icon"
    />
  </head>
  <body>
    <header class="header">
      <h1>Monitor Diario</h1>
      <div class="reloj" id="reloj"></div>
    </header>

    <main class="main">
      <section class="seccion" id="dolar">
        <h2>Cotización del Dólar</h2>
        <div class="cards" id="dolar-cards">
          <div class="card loading">
            <div class="card-titulo">Cargando...</div>
          </div>
        </div>
      </section>

      <section class="seccion" id="clima">
        <h2>Clima en Buenos Aires</h2>
        <div class="cards" id="clima-cards">
          <div class="card loading">
            <div class="card-titulo">Cargando...</div>
          </div>
        </div>
      </section>

      <section class="seccion" id="trenes">
        <h2>Línea Roca - Estado del Servicio</h2>
        <div class="cards" id="trenes-cards">
          <div class="card loading">
            <div class="card-titulo">Cargando...</div>
          </div>
        </div>
        <div class="alertas" id="trenes-alertas"></div>
      </section>

      <section class="seccion" id="arribos">
        <h2>Horarios</h2>
        <div id="arribos-container">
          <div class="card loading">
            <div class="card-titulo">Cargando...</div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>
        Última actualización: <span id="ultima-actualizacion">-</span>
      </p>
      <p>Fuentes: dolarapi.com | wttr.in | SOFSE Trenes</p>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
